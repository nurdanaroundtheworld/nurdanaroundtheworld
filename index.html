<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nurdan Around The World</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:url("images/Nurdanindia.jpeg") center center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    text-align:center;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:700px;
    padding:30px;
}

.travel-logo{
    width:95px;
    margin:0 auto 18px;
}

.travel-logo svg{
    width:100%;
    display:block;
}

.orbit{
    fill:none;
    stroke:#fff;
    stroke-width:3;
    stroke-dasharray:8 8;
}

.earth{
    fill:rgba(255,255,255,.05);
    stroke:#fff;
    stroke-width:3;
}

.continent,
.plane{
    fill:#fff;
}

h1{
    font-size:22px;
    font-weight:400;
    margin-bottom:18px;
}

.countries{
    font-size:18px;
    margin-bottom:16px;
}

.tagline{
    font-size:18px;
    font-style:italic;
    line-height:1.5;
    margin-bottom:42px;
}

.message{
    font-size:18px;
    line-height:1.5;
    margin-bottom:40px;
}

.button{
    display:inline-block;
    color:#fff;
    text-decoration:none;
    border:2px solid #fff;
    border-radius:45px;
    padding:16px 44px;
    font-size:18px;
    font-weight:bold;
}

@media(max-width:600px){

.container{
padding:20px;
}

.travel-logo{
width:85px;
margin-bottom:14px;
}

h1{
font-size:20px;
}

.countries{
font-size:16px;
}

.tagline{
font-size:16px;
}

.message{
font-size:16px;
}

.button{
font-size:18px;
padding:15px 40px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="travel-logo">

<svg viewBox="0 0 200 200">

<circle class="orbit" cx="100" cy="100" r="72"/>

<circle class="earth" cx="100" cy="100" r="52"/>

<path class="continent" d="M66 67 L78 56 L92 54 L101 60 L113 58 L126 66 L118 74 L106 74 L98 82 L86 80 L77 73 Z"/>

<path class="continent" d="M79 86 L94 82 L106 90 L108 103 L100 116 L95 132 L86 140 L78 126 L69 113 L68 100 Z"/>

<path class="continent" d="M113 82 L128 77 L141 84 L147 95 L140 106 L127 103 L119 94 Z"/>

<path class="continent" d="M124 116 L138 114 L145 122 L139 133 L126 130 L120 122 Z"/>

<path class="plane" d="M145 34 L154 45 L174 38 L180 43 L162 57 L167 73 L160 77 L151 64 L141 71 L136 67 L144 55 L133 44 Z"/>

</svg>

</div>

<h1>Nurdan Around The World</h1>

<div class="countries">
56 Countries
</div>

<div class="tagline">
Where Every Journey Becomes<br>
a Memory
</div>

<div class="message">
A new adventure is about to<br>
begin.
</div>

<a href="#" class="button">
Launching Soon
</a>

</div>

</body>
</html>
